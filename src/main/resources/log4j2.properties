# 1. Basic status of the logger itself (set to warn to see config errors)
status = warn

# 2. List all appenders the root logger will use
rootLogger.level = DEBUG
rootLogger.appenderRefs = stdout, scenario
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.scenario.ref = SCENARIOLOGFILE

# 3. Console Appender Configuration
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d %highlight{[%t] %-5level:}{STYLE=Logback} %msg%n%highlight{%throwable}{STYLE=Logback}
# Optional: Appender-level filter
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = INFO

# 4. Scenario File Appender Configuration
appender.SCENARIOLOGFILE.type = File
appender.SCENARIOLOGFILE.name = SCENARIOLOGFILE
appender.SCENARIOLOGFILE.filename = scenario.log
appender.SCENARIOLOGFILE.append = false
appender.SCENARIOLOGFILE.layout.type = PatternLayout
appender.SCENARIOLOGFILE.layout.pattern = %d{HH:mm:ss} %m%n